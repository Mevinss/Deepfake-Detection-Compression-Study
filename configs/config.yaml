# Training and evaluation configuration
# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
data:
  # Each directory must contain 'real/' and 'fake/' subdirectories
  train_dir: data/train
  val_dir:   data/val
  test_dir:  data/test

# ─────────────────────────────────────────────────────────────────────────────
# Model
# ─────────────────────────────────────────────────────────────────────────────
model:
  # One of: mobilenetv3 | efficientnet_b0 | ghostnet
  name:         efficientnet_b0
  pretrained:   true
  use_attention: true
  hidden_dim:   256
  dropout:      0.3

# ─────────────────────────────────────────────────────────────────────────────
# Training hyper-parameters
# ─────────────────────────────────────────────────────────────────────────────
image_size:    224
batch_size:    32
num_workers:   4
epochs:        35
lr:            0.0003
weight_decay:  0.0005

training:
  # Optimize directly for validation accuracy by default.
  target_metric: acc
  loss: focal
  focal_alpha: 0.25
  focal_gamma: 2.0
  scheduler: onecycle
  max_lr: 0.001
  pct_start: 0.15
  threshold_tuning: true
  label_smoothing: 0.03
  grad_clip_norm: 1.0
  early_stopping_patience: 8

# ─────────────────────────────────────────────────────────────────────────────
# Logging & checkpoints
# ─────────────────────────────────────────────────────────────────────────────
log_dir:        runs
checkpoint_dir: checkpoints

# ─────────────────────────────────────────────────────────────────────────────
# Robustness evaluation
# ─────────────────────────────────────────────────────────────────────────────
# CRF=0 means "no compression" baseline
crf_levels:    [0, 23, 32, 40]

# Models to include in the robustness comparison plot
eval_models:
  - mobilenetv3
  - efficientnet_b0
  - ghostnet
